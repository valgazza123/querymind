services:
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: querymind-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@querymind.local
      PGADMIN_DEFAULT_PASSWORD: querymind
    ports:
      - "5050:80"
    depends_on:
      - postgres

  seed:
    build:
      context: ./backend
    command: python sql/seeds/seed_data.py
    environment:
      POSTGRES_DB: querymind
      POSTGRES_USER: querymind
      POSTGRES_PASSWORD: querymind
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed
